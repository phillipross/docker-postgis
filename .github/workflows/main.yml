name: Docker PostGIS CI

on:
  push:
  pull_request:
  schedule:
    - cron: '15 5 * * 1'

defaults:
  run:
    shell: bash

jobs:

  make-docker-images:
    strategy:
      matrix:
#        postgres: [13, 14, 15, 16, 17]
        postgres: [17]
        postgis: ['3.5']
#        postgis: ['master']
#        variant: [default, alpine]
        variant: [default]
#        include:
#          - postgres: 16
#            postgis: master
#            variant: default
#          - postgres: 17
#            postgis: master
#            variant: default

    name: Build docker image for ${{ matrix.postgres }}-${{ matrix.postgis }} variant ${{ matrix.variant }}
    runs-on: ubuntu-24.04-arm
    continue-on-error: ${{ matrix.postgis == 'master' }}
    env:
      VERSION: ${{ matrix.postgres }}-${{ matrix.postgis }}
      VARIANT: ${{ matrix.variant }}

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Check docker info
      run: docker info

#    - name: Check docker configuration
#      run: ls -al /etc/docker/daemon.json

    - name: Check docker driver status
      run: docker info -f '{{ .DriverStatus }}'

    - name: Try loading binfmt
      run: docker run --privileged --rm tonistiigi/binfmt --install all

    - name: List docker images w/o tree option
      run: docker images

    - name: List docker images w/ tree option
      run: docker images --tree

